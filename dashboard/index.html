<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture Command · Industrial HCI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Paho MQTT over WebSocket -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<style>
  /* ══════════════════════════════════════════════════════
     DARK SCI-FI INDUSTRIAL DESIGN SYSTEM
     ══════════════════════════════════════════════════════ */
  :root {
    /* Core palette */
    --bg-deep:      #121212;
    --bg-canvas:    #1A1A1A;
    --bg-surface:   #242424;
    --bg-elevated:  #2E2E2E;
    
    /* Accent */
    --accent:       #FF5500;
    --accent-dim:   rgba(255, 85, 0, 0.15);
    --accent-glow:  0 0 10px rgba(255,85,0,0.6);
    --accent-pulse: 0 0 20px rgba(255,85,0,0.4), 0 0 40px rgba(255,85,0,0.2);
    
    /* Text */
    --text-primary: #FFFFFF;
    --text-body:    #E0E0E0;
    --text-muted:   #9E9E9E;
    --text-dim:     #616161;
    
    /* Borders */
    --border:       #3A3A3A;
    --border-subtle:#2A2A2A;
    
    /* Status */
    --success:      #4CAF50;
    --error:        #F44336;
    --warning:      #FFC107;
    
    /* Typography */
    --font-sans:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono:    'Roboto Mono', monospace;
    
    /* Sizing */
    --radius:       12px;
    --radius-sm:    8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-body);
    font-family: var(--font-sans);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* Dot-grid background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,85,0,0.08) 1px, transparent 0);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* Radial orange glow center */
  body::after {
    content: '';
    position: fixed;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(255,85,0,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-subtle);
    animation: slideDown 0.5s ease both;
  }

  .brand {}
  .brand-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.9;
  }

  .brand-name {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .brand-name .accent { color: var(--accent); }
  .brand-name .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  .conn-panel {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  .conn-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .conn-input {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-body);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    width: 160px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .conn-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .conn-btn {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    background: var(--bg-elevated);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .conn-btn::before {
    content: '';
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.2s;
  }

  .conn-btn:hover {
    background: var(--accent);
    color: var(--text-primary);
    box-shadow: var(--accent-glow);
  }

  .conn-btn:hover::before { background: var(--text-primary); }

  .conn-btn.active {
    background: var(--accent);
    color: var(--text-primary);
    box-shadow: var(--accent-glow);
  }

  .conn-btn.active::before {
    background: var(--text-primary);
    box-shadow: 0 0 8px rgba(255,255,255,0.5);
  }

  .conn-btn.danger {
    background: var(--error);
    color: var(--text-primary);
    box-shadow: 0 0 10px rgba(244,67,54,0.5);
  }

  .conn-btn.danger::before { background: var(--text-primary); }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .status-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.3s;
  }

  .status-indicator.on {
    background: var(--success);
    box-shadow: 0 0 10px var(--success), 0 0 20px var(--success);
    animation: pulse 1.5s ease infinite;
  }

  .status-indicator.err {
    background: var(--error);
    box-shadow: 0 0 10px var(--error);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Hero Gesture Display ── */
  .hero {
    margin-bottom: 40px;
    animation: fadeIn 0.6s 0.1s ease both;
  }

  .hero-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  /* Dot pattern overlay for hero */
  .hero-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 2px 2px, rgba(255,85,0,0.04) 1px, transparent 0);
    background-size: 24px 24px;
    pointer-events: none;
    opacity: 0.5;
  }

  .hero-card.fired {
    border-color: var(--accent);
    box-shadow: var(--accent-pulse);
  }

  .hero-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 20px;
    position: relative;
  }

  .hero-gesture {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    line-height: 1;
    margin-bottom: 20px;
    position: relative;
    text-transform: uppercase;
  }

  .hero-gesture.active {
    color: var(--accent);
    text-shadow: var(--accent-glow);
  }

  .hero-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .hero-conf {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .hero-conf span {
    color: var(--accent);
    font-weight: 600;
  }

  /* Circular confidence gauge */
  .conf-gauge {
    position: relative;
    width: 60px;
    height: 60px;
  }

  .conf-gauge svg {
    transform: rotate(-90deg);
    width: 60px;
    height: 60px;
  }

  .conf-gauge-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .conf-gauge-fill {
    fill: none;
    stroke: url(#gaugeGradient);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 157;
    stroke-dashoffset: 157;
    transition: stroke-dashoffset 0.4s ease;
    filter: drop-shadow(0 0 4px rgba(255,85,0,0.6));
  }

  .conf-gauge-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ── Section Headers ── */
  .section-head {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-head::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }

  /* ── Stats Row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeIn 0.5s 0.15s ease both;
  }

  .stat-box {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Dot pattern for stat boxes */
  .stat-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,85,0,0.03) 1px, transparent 0);
    background-size: 16px 16px;
    pointer-events: none;
  }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1;
    position: relative;
  }

  .stat-value.accent {
    color: var(--accent);
    text-shadow: var(--accent-glow);
  }

  /* ── Gesture Grid ── */
  .gesture-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeIn 0.5s 0.25s ease both;
  }

  .g-card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s ease;
    cursor: default;
  }

  /* Top accent line */
  .g-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .g-card.hit {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--accent-glow);
  }

  .g-card.hit::after { transform: scaleX(1); }

  .g-icon {
    font-size: 28px;
    margin-bottom: 12px;
    filter: grayscale(0.2);
  }

  .g-name {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-body);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .g-count {
    font-size: 10px;
    color: var(--text-muted);
  }

  .g-count strong {
    color: var(--accent);
    font-size: 20px;
    font-weight: 700;
    display: block;
    line-height: 1.2;
    margin-bottom: 2px;
  }

  /* Progress bar at bottom */
  .g-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), rgba(255,85,0,0.4));
    width: 0%;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px rgba(255,85,0,0.4);
  }

  /* Suppressed/idle card */
  .g-card.suppressed {
    opacity: 0.35;
    border-style: dashed;
    pointer-events: none;
  }

  .g-card.suppressed .g-name { color: var(--text-dim); }

  .g-suppressed-tag {
    font-family: var(--font-mono);
    font-size: 8px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    display: inline-block;
  }

  /* ── Log Feed ── */
  .log-wrap {
    animation: fadeIn 0.5s 0.3s ease both;
  }

  .log-feed {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    height: 240px;
    overflow-y: auto;
    padding: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 2;
  }

  .log-feed::-webkit-scrollbar { width: 6px; }
  .log-feed::-webkit-scrollbar-track { background: var(--bg-canvas); border-radius: 3px; }
  .log-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .log-feed::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  .log-line {
    display: flex;
    gap: 16px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border-subtle);
    opacity: 0;
    animation: logSlide 0.3s ease forwards;
  }

  @keyframes logSlide {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-ts { color: var(--text-dim); min-width: 75px; }
  .log-seq { color: var(--text-dim); min-width: 60px; opacity: 0.6; }
  .log-msg { color: var(--text-body); flex: 1; }

  .log-line.gesture .log-msg { color: var(--accent); font-weight: 500; }
  .log-line.error .log-msg { color: var(--error); }
  .log-line.info .log-msg { color: var(--text-muted); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .container { padding: 20px 16px 40px; }
    header { flex-direction: column; align-items: stretch; }
    .conn-panel { align-items: stretch; }
    .conn-row { justify-content: stretch; }
    .conn-input { flex: 1; width: auto; }
    .hero-card { padding: 32px 20px; }
    .hero-gesture { font-size: 2rem; }
  }
</style>
</head>
<body>

<!-- SVG Gradient Definition -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
</svg>

<div class="container">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-tag">Wearable · Live Monitor</div>
      <div class="brand-name">
        <span>GESTURE</span><span class="accent">CMD</span>
        <span class="dot"></span>
      </div>
    </div>
    <div class="conn-panel">
      <div class="conn-row">
        <input class="conn-input" id="brokerHost" value="localhost" placeholder="Broker IP">
        <input class="conn-input" id="brokerPort" value="9001" placeholder="WS Port" style="width:90px">
        <button class="conn-btn" id="connBtn" onclick="toggleConnect()">Connect</button>
      </div>
      <div class="status-badge">
        <div class="status-indicator" id="statusIndicator"></div>
        <span id="statusTxt">OFFLINE</span>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-card" id="heroCard">
      <div class="hero-label">Last Detected Gesture</div>
      <div class="hero-gesture" id="heroGesture">WAITING...</div>
      <div class="hero-meta">
        <div class="conf-gauge">
          <svg viewBox="0 0 60 60">
            <circle class="conf-gauge-bg" cx="30" cy="30" r="25"/>
            <circle class="conf-gauge-fill" id="gaugeCircle" cx="30" cy="30" r="25"/>
          </svg>
          <div class="conf-gauge-text" id="gaugeText">—</div>
        </div>
        <div class="hero-conf">CONFIDENCE <span id="heroConfVal">—</span></div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="section-head">Session Statistics</div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">Total Gestures</div>
      <div class="stat-value accent" id="statTotal">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Last Confidence</div>
      <div class="stat-value" id="statConf">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Top Gesture</div>
      <div class="stat-value" id="statMost">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">MQTT Messages</div>
      <div class="stat-value" id="statMsgs">0</div>
    </div>
  </div>

  <!-- Gesture Cards -->
  <div class="section-head">Gesture Breakdown</div>
  <div class="gesture-grid" id="gestureGrid"></div>

  <!-- Log -->
  <div class="log-wrap">
    <div class="section-head">Live MQTT Feed</div>
    <div class="log-feed" id="logFeed"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  GESTURE DASHBOARD — MQTT CLIENT LOGIC
// ══════════════════════════════════════════════════════

const GESTURES = [
  { label: 'fist_hold',    icon: '✊', suppressed: false },
  { label: 'flick_down',   icon: '👇', suppressed: false },
  { label: 'flick_up',     icon: '☝️', suppressed: false },
  { label: 'wave_left',    icon: '🤚', suppressed: false },
  { label: 'wave_right',   icon: '👋', suppressed: false },
  { label: 'wrist_rotate', icon: '🔄', suppressed: false },
  { label: 'idle',         icon: '✋', suppressed: true  },
];

const counts = {};
let totalFired = 0;
let totalMsgs = 0;
let client = null;
let connected = false;

GESTURES.forEach(g => counts[g.label] = 0);

// Build gesture cards
function buildCards() {
  const grid = document.getElementById('gestureGrid');
  GESTURES.forEach(g => {
    const card = document.createElement('div');
    card.className = 'g-card' + (g.suppressed ? ' suppressed' : '');
    card.id = 'card_' + g.label;
    card.innerHTML = `
      <div class="g-icon">${g.icon}</div>
      <div class="g-name">${g.label.replace(/_/g, ' ')}</div>
      ${g.suppressed
        ? '<div class="g-suppressed-tag">Rest State · Not Published</div>'
        : `<div class="g-count"><strong id="cnt_${g.label}">0</strong>detections</div>`
      }
      <div class="g-progress" id="bar_${g.label}"></div>
    `;
    grid.appendChild(card);
  });
}

// MQTT connect toggle
function toggleConnect() {
  if (connected) { disconnect(); return; }

  const host = document.getElementById('brokerHost').value.trim();
  const port = parseInt(document.getElementById('brokerPort').value.trim());
  const clientId = 'gesture_dashboard_' + Math.random().toString(16).slice(2, 8);

  log('info', `Connecting to ws://${host}:${port} ...`);

  client = new Paho.MQTT.Client(host, port, '/mqtt', clientId);

  client.onConnectionLost = (res) => {
    connected = false;
    setStatus('disconnected');
    log('error', `Connection lost: ${res.errorMessage}`);
    document.getElementById('connBtn').textContent = 'Connect';
    document.getElementById('connBtn').classList.remove('active', 'danger');
  };

  client.onMessageArrived = onMessage;

  client.connect({
    onSuccess: () => {
      connected = true;
      setStatus('connected');
      log('info', `Connected. Subscribing to wearable/gesture ...`);
      client.subscribe('wearable/gesture');
      document.getElementById('connBtn').textContent = 'Disconnect';
      document.getElementById('connBtn').classList.add('danger');
      document.getElementById('connBtn').classList.remove('active');
    },
    onFailure: (err) => {
      setStatus('error');
      log('error', `Connection failed: ${err.errorMessage}`);
    },
    useSSL: false,
    timeout: 5,
  });
}

function disconnect() {
  if (client && connected) {
    client.disconnect();
  }
  connected = false;
  setStatus('disconnected');
  document.getElementById('connBtn').textContent = 'Connect';
  document.getElementById('connBtn').classList.remove('active', 'danger');
}

// Handle incoming message
function onMessage(msg) {
  totalMsgs++;
  document.getElementById('statMsgs').textContent = totalMsgs;

  let data;
  try {
    data = JSON.parse(msg.payloadString);
  } catch {
    log('error', 'Bad JSON: ' + msg.payloadString);
    return;
  }

  const { gesture, confidence } = data;
  if (!gesture) return;

  log('gesture', `${gesture}  —  ${(confidence * 100).toFixed(1)}%`);
  fireGesture(gesture, confidence);
}

// Fire a gesture detection
let heroTimer = null;

function fireGesture(label, confidence) {
  totalFired++;
  counts[label] = (counts[label] || 0) + 1;

  // Hero update
  const heroCard = document.getElementById('heroCard');
  const heroGesture = document.getElementById('heroGesture');
  const heroConf = document.getElementById('heroConfVal');
  const gaugeCircle = document.getElementById('gaugeCircle');
  const gaugeText = document.getElementById('gaugeText');

  heroGesture.textContent = label.replace(/_/g, ' ').toUpperCase();
  heroGesture.classList.add('active');
  heroConf.textContent = (confidence * 100).toFixed(1) + '%';

  // Update circular gauge (circumference = 2 * PI * 25 ≈ 157)
  const circumference = 157;
  const offset = circumference - (confidence * circumference);
  gaugeCircle.style.strokeDashoffset = offset;
  gaugeText.textContent = Math.round(confidence * 100) + '%';

  heroCard.classList.remove('fired');
  void heroCard.offsetWidth;
  heroCard.classList.add('fired');

  clearTimeout(heroTimer);
  heroTimer = setTimeout(() => {
    heroGesture.classList.remove('active');
    heroCard.classList.remove('fired');
  }, 1200);

  // Card highlight
  const card = document.getElementById('card_' + label);
  if (card) {
    card.classList.remove('hit');
    void card.offsetWidth;
    card.classList.add('hit');
    setTimeout(() => card.classList.remove('hit'), 600);
  }

  // Update count and bar
  const cntEl = document.getElementById('cnt_' + label);
  if (cntEl) cntEl.textContent = counts[label];

  const maxCount = Math.max(...Object.values(counts), 1);
  GESTURES.forEach(g => {
    const bar = document.getElementById('bar_' + g.label);
    if (bar) bar.style.width = ((counts[g.label] / maxCount) * 100) + '%';
  });

  // Stats
  document.getElementById('statTotal').textContent = totalFired;
  document.getElementById('statConf').textContent = (confidence * 100).toFixed(0) + '%';

  const mostLabel = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])[0][0];
  document.getElementById('statMost').textContent =
    mostLabel.replace(/_/g, ' ').toUpperCase();
}

// Log
function log(type, msg) {
  const feed = document.getElementById('logFeed');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;

  const now = new Date();
  const ts = now.toLocaleTimeString('en-GB', { hour12: false });
  const seq = String(totalMsgs).padStart(5, '0');

  line.innerHTML = `
    <span class="log-ts">${ts}</span>
    <span class="log-seq">#${seq}</span>
    <span class="log-msg">${msg}</span>
  `;

  feed.prepend(line);
  while (feed.children.length > 80) feed.removeChild(feed.lastChild);
}

// Status indicator
function setStatus(state) {
  const indicator = document.getElementById('statusIndicator');
  const txt = document.getElementById('statusTxt');
  indicator.className = 'status-indicator ' + (state === 'connected' ? 'on' : state === 'error' ? 'err' : '');
  txt.textContent = state === 'connected' ? 'LIVE'
                  : state === 'error' ? 'ERROR'
                  : 'OFFLINE';
}

// Init
buildCards();
log('info', 'Dashboard ready. Enter broker IP and connect.');
</script>
