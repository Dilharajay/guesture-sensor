# /etc/mosquitto/conf.d/wearable.conf
# =====================================================
#  Mosquitto config for Gesture Wearable project
#  Place this file at /etc/mosquitto/conf.d/wearable.conf
#  then run: sudo systemctl restart mosquitto
# =====================================================

# TCP listener — for ESP8266 firmware and inference_server.py
listener 1883 0.0.0.0
allow_anonymous true

# WebSocket listener — for the browser dashboard
# Browsers cannot speak raw MQTT TCP, they need MQTT over WebSocket
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# Log everything for debugging during development
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe

# Keep messages in memory (no persistence needed for gestures)
persistence false
