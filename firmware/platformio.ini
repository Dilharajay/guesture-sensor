; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Upload data collection code:
; pio run -e data --target upload

; Upload model inference code:
; pio run -e model --target upload


[env:data] ; builds only data_collection.cpp
platform = espressif8266
board = nodemcuv2
framework = arduino
build_src_filter = +<data_collection.cpp> +<common/*> ; Only compile specific source files, ignore others.
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyUSB0

[env:model] ; builds only model_inference.cpp
platform = espressif8266
board = nodemcuv2
framework = arduino
build_src_filter = +<model_inference.cpp> +<common/*>
monitor_speed = 115200
upload_speed = 921600
upload_port = /dev/ttyUSB0